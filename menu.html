<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * {
            margin: 0px;
            padding: 0px;
            font-family: sans-serif;
            box-sizing: border-box;
            text-decoration: none;
            list-style: none;
        }

        img {
            width: 80px;
        }

        header {
            display: flex;
            justify-content: space-between;
            box-shadow: 0px 2px 10px 0px #ccc;
            padding: 0px 50px;
            align-items: center;
        }

        header nav ul {
            display: flex;
            gap: 30px;
        }

        header nav ul li a {
            color: black;
            font-weight: bold;
            text-transform: uppercase;

        }
        .micon{
            display: none;
         }

        @media (max-width:575px) {
            header nav {
                position: fixed;
                top: 0px;
                background-color: blueviolet;
                height: 100vh;
                width: 80%;
                left: 0px;
                padding: 10px;
                left: -100%;
                transition: 0.5s ease;


            }

            header nav ul {
                flex-direction: column;

            }

            .micon{
                display: block;
                cursor: pointer;
            }
            .showmenu{
                left: 0px !important;
            }
            
        }
    </style>
</head>

<body>
    <header>
        <figure>
            <img
                src="https://img.freepik.com/free-vector/bird-colorful-logo-gradient-vector_343694-1365.jpg?semt=ais_rp_50_assets&w=740&q=80">
        </figure>
        <i class="fa-solid fa-bars micon"></i> 
        <nav>
            <ul>
                <li><a href="">Home</a></li>
                <li><a href="">About</a></li>
                <li><a href="">Course</a></li>
                <li><a href="">Gallery</a></li>
                <li><a href="">Contact Us</a></li>
            </ul>
        </nav>
    </header>

</body>
<script>
    let miconElement=document.querySelector('.micon')
    let navElement=document.querySelector('nav')
    
    miconElement.addEventListener('click',()=>{
        miconElement.classList.toggle("fa-bars")
        miconElement.classList.toggle("fa-xmark")
        navElement.classList.toggle('showmenu')
    })

</script>

</html>
